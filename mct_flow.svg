<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 210" width="1040" height="210" style="display:block;">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.12)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0.03)"/>
    </linearGradient>
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(34,197,94,0.10)"/>
      <stop offset="100%" stop-color="rgba(34,197,94,0.02)"/>
    </linearGradient>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#475569" />
    </marker>
    <marker id="ad" markerWidth="5" markerHeight="7" refX="2.5" refY="7" orient="auto">
      <path d="M0,0 L2.5,7 L5,0" fill="#475569" />
    </marker>
    <filter id="gl">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sh">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>
  <style>
    .b  { fill: #131c31; stroke: #1e2a45; stroke-width: 1.5; rx: 8; }
    .cb { fill: url(#cg); stroke: rgba(59,130,246,0.3); stroke-width: 1.5; rx: 10; }
    .ob { fill: url(#og); stroke: rgba(34,197,94,0.3); stroke-width: 1.5; rx: 8; }
    .t  { font-family: "Space Grotesk",system-ui,sans-serif; font-size: 12px; font-weight: 600; fill: #e2e8f0; text-anchor: middle; dominant-baseline: central; }
    .st { font-family: "DM Sans",system-ui,sans-serif; font-size: 10px; fill: #94a3b8; text-anchor: middle; dominant-baseline: central; }
    .tb { fill: #60a5fa; }
    .tg { fill: #22c55e; }
    .ln { stroke: #475569; stroke-width: 1.5; fill: none; }
    .ld { stroke: #475569; stroke-width: 1.5; fill: none; }
    .leg { fill: rgba(15,15,26,0.5); stroke: #1e2a45; stroke-width: 1; rx: 6; }
    .lh { font-family: "Space Grotesk",system-ui,sans-serif; font-size: 9px; font-weight: 700; fill: #64748b; dominant-baseline: central; letter-spacing: 0.08em; }
    .le { font-family: "DM Sans",system-ui,sans-serif; font-size: 9px; fill: #94a3b8; dominant-baseline: central; }
    .ph { font-family: "DM Sans",system-ui,sans-serif; font-size: 9px; fill: #475569; dominant-baseline: central; letter-spacing: 0.04em; }
  </style>

  <!-- Row 1 -->
  <text class="ph" x="20" y="18">SENSOR &amp; IMAGE PROCESSING</text>

  <rect class="b" x="20" y="28" width="145" height="44" filter="url(#sh)" />
  <text class="t" x="92" y="46">Sensor Data</text>
  <text class="st" x="92" y="62">Analysis</text>
  <line class="ln" x1="165" y1="50" x2="195" y2="50" marker-end="url(#ar)"/>

  <rect class="b" x="200" y="28" width="145" height="44" filter="url(#sh)" />
  <text class="t" x="272" y="46">Image Based</text>
  <text class="st" x="272" y="62">Analysis</text>
  <line class="ln" x1="345" y1="50" x2="375" y2="50" marker-end="url(#ar)"/>

  <rect class="cb" x="380" y="24" width="230" height="52" filter="url(#sh)" />
  <text class="t tb" x="495" y="44" filter="url(#gl)">MCT Intelligent Fusion Engine</text>
  <text class="st" x="495" y="60">Multi-modal sensor &amp; image analysis</text>

  <!-- Down arrow -->
  <line class="ld" x1="495" y1="76" x2="495" y2="122" marker-end="url(#ad)"/>

  <!-- Row 2 -->
  <text class="ph" x="380" y="108">ALIGNMENT PIPELINE</text>

  <rect class="b" x="380" y="118" width="220" height="44" filter="url(#sh)" />
  <text class="t" x="490" y="136">Alignment</text>
  <text class="st" x="490" y="152">Per-frame homography</text>
  <line class="ln" x1="600" y1="140" x2="625" y2="140" marker-end="url(#ar)"/>

  <rect class="b" x="630" y="118" width="120" height="44" filter="url(#sh)" />
  <text class="t" x="690" y="136">Warping</text>
  <text class="st" x="690" y="152">Geometric</text>
  <line class="ln" x1="750" y1="140" x2="775" y2="140" marker-end="url(#ar)"/>

  <rect class="b" x="780" y="118" width="120" height="44" filter="url(#sh)" />
  <text class="t" x="840" y="136">Blending</text>
  <text class="st" x="840" y="152">Photometric</text>
  <line class="ln" x1="900" y1="140" x2="925" y2="140" marker-end="url(#ar)"/>

  <rect class="ob" x="930" y="114" width="100" height="52" filter="url(#sh)" />
  <text class="t tg" x="980" y="136">Seamless</text>
  <text class="t tg" x="980" y="152">Output</text>

  <!-- Legend -->
  <rect class="leg" x="680" y="10" width="100" height="62" />
  <text class="lh" x="690" y="22">LEGEND</text>
  <rect x="690" y="30" width="7" height="7" rx="2" fill="rgba(59,130,246,0.5)" />
  <text class="le" x="704" y="37">Core engine</text>
  <rect x="690" y="44" width="7" height="7" rx="2" fill="rgba(34,197,94,0.5)" />
  <text class="le" x="704" y="51">Output</text>
  <rect x="690" y="58" width="7" height="7" rx="2" fill="#131c31" stroke="#1e2a45" stroke-width="1" />
  <text class="le" x="704" y="65">Process</text>

  @media (prefers-color-scheme: light) {
    .b { fill: #f1f4f9; stroke: #dce3ed; }
    .cb { fill: rgba(37,99,235,0.04); stroke: rgba(37,99,235,0.2); }
    .ob { fill: rgba(22,163,74,0.03); stroke: rgba(22,163,74,0.2); }
    .t { fill: #0b1324; }
    .st { fill: #55657d; }
    .tb { fill: #2563eb; }
    .tg { fill: #16a34a; }
    .ln { stroke: #94a3b8; }
    .ld { stroke: #94a3b8; }
    .ph { fill: #94a3b8; }
    .leg { fill: rgba(255,255,255,0.85); stroke: #dce3ed; }
    .lh { fill: #94a3b8; }
    .le { fill: #64748b; }
  }
</svg>